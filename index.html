<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Iftar Collection</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: #f4f6f8;
    padding: 40px;
}

.container{
    max-width: 700px;
    margin: auto;
    background: white;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 5px 12px rgba(0,0,0,0.1);
}

h2{
    text-align: center;
}

/* Flex container for totals on top of table */
.totals-top{
    display: flex;
    justify-content: space-between;
    font-weight: bold;
    font-size: 16px;
    margin-bottom: 15px;
}

.totals-top div{
    flex: 1;
    text-align: center;
    padding: 6px 0;
    border-radius: 6px;
}

.totals-top div:first-child{
    text-align: left;
}

.totals-top div:last-child{
    text-align: right;
}

/* Optional: colored box for confirmed members */
.confirmed-box{
    background: #d4edda;
    color: #155724;
}

/* Table styling */
table{
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

th, td{
    padding: 12px;
    border-bottom: 1px solid #ddd;
    text-align: center;
}

th{
    background: #ffca2c;
}

.status-confirmed{
    background: #d4edda;
    color: #155724;
    padding: 6px 12px;
    border-radius: 6px;
    font-weight: bold;
}

.status-processing{
    background: #fff3cd;
    color: #856404;
    padding: 6px 12px;
    border-radius: 6px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<h2>Iftar Party Collection</h2>

<!-- Totals on top -->
<div class="totals-top">
    <div>Total Members: <span id="total-members">0</span></div>
    <div class="confirmed-box">Confirmed Members: <span id="confirmed-members">0</span></div>
    <div>Total Collected: <span id="total">0</span></div>
</div>

<table>
<thead>
<tr>
<th>Name</th>
<th>Amount</th>
<th>Status</th>
</tr>
</thead>

<tbody id="table-body"></tbody>
</table>

</div>

<script>
const sheetID = "1rZ7F0m4LrOnVYrt2dJ_uYV6ZhElXeh8dal4xzAs7X2o";
const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json`;

function loadTable() {
    fetch(url)
    .then(res => res.text())
    .then(data => {
        const json = JSON.parse(data.substr(47).slice(0,-2));
        const rows = json.table.rows;

        const tbody = document.getElementById("table-body");
        tbody.innerHTML = ""; // Clear existing rows

        let total = 0;
        let memberCount = 0;
        let confirmedMemberCount = 0;

        rows.forEach(r => {
            const name = r.c[0]?.v || "";
            const amountCell = r.c[1];
            const paid = r.c[2]?.v;

            if(!name) return;

            memberCount++;

            let amount = 0;
            if(amountCell){
                if(amountCell.v != null && !isNaN(amountCell.v)){
                    amount = parseFloat(amountCell.v);
                } else if(amountCell.f){
                    amount = parseFloat(amountCell.f.toString().replace(/,/g,'').trim()) || 0;
                }
            }

            if(paid){
                total += amount;
                confirmedMemberCount++;
            }

            const statusText = paid ? "Confirmed" : "Processing";
            const statusClass = paid ? "status-confirmed" : "status-processing";

            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td>${name}</td>
                <td>${amount.toLocaleString()}</td>
                <td><span class="${statusClass}">${statusText}</span></td>
            `;
            tbody.appendChild(tr);
        });

        // Update totals
        document.getElementById("total").textContent = total.toLocaleString();
        document.getElementById("total-members").textContent = memberCount;
        document.getElementById("confirmed-members").textContent = confirmedMemberCount;
    })
    .catch(err => console.error("Error fetching Google Sheet:", err));
}

// Initial load
loadTable();

// Auto-refresh every 10 seconds
setInterval(loadTable, 10000);
</script>

</body>
</html>
