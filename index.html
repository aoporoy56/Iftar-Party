<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Iftar Collection - Live Dashboard</title>

<style>
body{
    font-family:Arial;
    background:#f4f6f8;
    padding:40px;
}

.container{
    max-width:800px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 5px 12px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
}

.totals-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-weight:bold;
    font-size:16px;
    margin-bottom:10px;
}

#last-updated{
    font-weight:normal;
    font-size:12px;
    color:#555;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}

th,td{
    padding:12px;
    border-bottom:1px solid #ddd;
    text-align:center;
}

th{
    background:#ffca2c;
}

.status-confirmed{
    background:#d4edda;
    color:#155724;
    padding:6px 12px;
    border-radius:6px;
    font-weight:bold;
}

.status-processing{
    background:#fff3cd;
    color:#856404;
    padding:6px 12px;
    border-radius:6px;
    font-weight:bold;
}

.visitor-count{
    font-size:14px;
    font-weight:bold;
    color:#333;
    margin-top:5px;
}
</style>
</head>

<body>

<div class="container">

<h2>Iftar Party Collection - Live Dashboard</h2>

<!-- Totals and Visitor -->
<div class="totals-top">
    <div>Total Members: <span id="total-members">0</span></div>
    <div id="last-updated">Last Updated: --:--:--</div>
    <div>Total Collected: <span id="total">0</span></div>
</div>
<div class="visitor-count">
    Visitors Online: <span id="visitor-count">0</span>
</div>

<table>
<thead>
<tr>
<th>Name</th>
<th>Amount</th>
<th>Status</th>
</tr>
</thead>

<tbody id="table-body"></tbody>
</table>

</div>

<script>
const sheetID = "1rZ7F0m4LrOnVYrt2dJ_uYV6ZhElXeh8dal4xzAs7X2o";
const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json`;

const counterAPI = "https://api.counterapi.dev/v2/iftar-dashboard/iftar-dashboard";
const apiToken = "ut_W7ixEPKmdlCaPLC9YTqpdkBXUQzZdtPoHeng1UPg";

// Load Google Sheet data
function loadTable() {
    fetch(url)
    .then(res => res.text())
    .then(data => {
        const json = JSON.parse(data.substr(47).slice(0,-2));
        const rows = json.table.rows;

        const tbody = document.getElementById("table-body");
        tbody.innerHTML = ""; // Clear table

        let total = 0;
        let memberCount = 0;

        rows.forEach(r => {
            const name = r.c[0]?.v || "";
            const amountCell = r.c[1];
            const paid = r.c[2]?.v;

            if(!name) return;

            memberCount++;

            let amount = 0;
            if(amountCell){
                if(amountCell.v != null && !isNaN(amountCell.v)){
                    amount = parseFloat(amountCell.v);
                } else if(amountCell.f){
                    amount = parseFloat(amountCell.f.toString().replace(/,/g,'').trim()) || 0;
                }
            }

            if(paid) total += amount;

            const statusText = paid ? "Confirmed" : "Processing";
            const statusClass = paid ? "status-confirmed" : "status-processing";

            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td>${name}</td>
                <td>${amount.toLocaleString()}</td>
                <td><span class="${statusClass}">${statusText}</span></td>
            `;
            tbody.appendChild(tr);
        });

        document.getElementById("total").textContent = total.toLocaleString();
        document.getElementById("total-members").textContent = memberCount;

        const now = new Date();
        document.getElementById("last-updated").textContent = "Last Updated: " + now.toLocaleTimeString();
    })
    .catch(err => console.error("Error fetching Google Sheet:", err));
}

// Increment visitor counter and get current value
function updateVisitorCount() {
    fetch(counterAPI + "/up", {
        method: "POST",
        headers: {
            "Authorization": "Bearer " + apiToken,
            "Content-Type": "application/json"
        }
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("visitor-count").textContent = data.value;
    })
    .catch(err => console.error("Error updating visitor count:", err));
}

// Initial load
loadTable();
updateVisitorCount();

// Auto-refresh every 10 seconds
setInterval(() => {
    loadTable();
    updateVisitorCount();
}, 10000);
</script>

</body>
</html>
